<div class="card">

<h2>WinGo Game</h2>

<h1 id="timer">30</h1>

<h2>Result: <span id="result">0</span></h2>

<div class="numberGrid">

<button onclick="playGame('0')" class="numberBtn violet">0</button>
<button onclick="playGame('1')" class="numberBtn green">1</button>
<button onclick="playGame('2')" class="numberBtn red">2</button>
<button onclick="playGame('3')" class="numberBtn green">3</button>
<button onclick="playGame('4')" class="numberBtn red">4</button>
<button onclick="playGame('5')" class="numberBtn violet">5</button>
<button onclick="playGame('6')" class="numberBtn red">6</button>
<button onclick="playGame('7')" class="numberBtn green">7</button>
<button onclick="playGame('8')" class="numberBtn red">8</button>
<button onclick="playGame('9')" class="numberBtn green">9</button>

</div>

<div class="colorGrid">

<button onclick="playGame('Green')" class="greenBtn">Green</button>

<button onclick="playGame('Violet')" class="violetBtn">Violet</button>

<button onclick="playGame('Red')" class="redBtn">Red</button>

<button onclick="playGame('Big')" class="bigBtn">Big</button>

<button onclick="playGame('Small')" class="smallBtn">Small</button>

</div>

</div>

<script>

function playGame(type){

let amount = prompt("Enter Bet Amount");

if(amount==null || amount==""){
return;
}

alert("Bet Successful On " + type);

}

let time = 30;

setInterval(function(){

document.getElementById("timer").innerHTML = time;

time--;

if(time < 0){

time = 30;

let result = Math.floor(Math.random()*10);

document.getElementById("result").innerHTML = result;

}

},1000);

</script>
