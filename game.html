<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Winner India Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:white;
}

.header{
width:100%;
padding:20px;
background:#111;
text-align:center;
font-size:38px;
font-weight:bold;
color:red;
box-shadow:0 0 10px rgba(255,0,0,0.4);
}

.balance-box{
width:90%;
margin:20px auto;
background:#111;
padding:25px;
border-radius:15px;
text-align:center;
}

.balance-box h2{
font-size:30px;
margin-bottom:15px;
}

.balance{
font-size:42px;
color:#00ff66;
}

.btn-grid{
width:90%;
margin:20px auto;
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.btn{
padding:18px;
background:red;
border:none;
border-radius:12px;
color:white;
font-size:20px;
font-weight:bold;
cursor:pointer;
}

.section{
width:90%;
margin:20px auto;
background:#111;
padding:20px;
border-radius:15px;
}

.section h3{
margin-bottom:15px;
font-size:28px;
color:red;
}

input,textarea{
width:100%;
padding:14px;
margin-bottom:12px;
border:none;
border-radius:10px;
font-size:16px;
outline:none;
}

textarea{
height:120px;
resize:none;
}

.game-box{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:15px;
}

.game-btn{
padding:20px;
background:#1a1a1a;
border:2px solid red;
border-radius:12px;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

.footer{
text-align:center;
padding:20px;
color:#888;
font-size:15px;
}

</style>
</head>

<body>

<div class="header">
Winner India
</div>

<div class="balance-box">
<h2>Available Balance</h2>
<div class="balance">₹ 10,500</div>
</div>

<div class="btn-grid">
<button class="btn" onclick="showDeposit()">
Deposit
</button>

<button class="btn" onclick="showWithdraw()">
Withdraw
</button>

<button class="btn" onclick="openGame()">
Start Game
</button>

<button class="btn" onclick="historyOpen()">
History
</button>
</div>

<div class="section" id="depositBox" style="display:none;">

<h3>Deposit Money</h3>

<input type="number"
placeholder="Enter Deposit Amount">

<input type="text"
placeholder="Enter UPI ID">

<button class="btn"
onclick="depositNow()">
Submit Deposit
</button>

</div>

<div class="section" id="withdrawBox" style="display:none;">

<h3>Withdraw Money</h3>

<input type="number"
placeholder="Enter Withdraw Amount">

<input type="text"
placeholder="Bank Account Number">

<input type="text"
placeholder="IFSC Code">

<button class="btn"
onclick="withdrawNow()">
Submit Withdrawal
</button>

</div>

<div class="section">

<h3>Game Zone</h3>

<div class="game-box">

<button class="game-btn"
onclick="playColor()">
Color Prediction
</button>

<button class="game-btn"
onclick="playNumber()">
Lucky Number
</button>

<button class="game-btn"
onclick="spinWheel()">
Spin Wheel
</button>

<button class="game-btn"
onclick="jackpotGame()">
Jackpot
</button>

</div>

</div>

<div class="section">

<h3>Support System</h3>

<input type="text"
id="name"
placeholder="Enter Your Name">

<textarea id="msg"
placeholder="Type Your Message"></textarea>

<button class="btn"
onclick="sendSupport()">
Send Message
</button>

</div>

<div class="section">

<h3>Latest Notifications</h3>

<p>✅ Fast Deposit Active</p>
<br>

<p>✅ Instant Withdrawal Available</p>
<br>

<p>🔥 Daily Bonus Added</p>
<br>

<p>🎁 VIP Rewards Enabled</p>

</div>

<div class="footer">
© 2026 Winner India All Rights Reserved
</div>

<script>

function showDeposit(){

document.getElementById(
'depositBox'
).style.display='block';

document.getElementById(
'withdrawBox'
).style.display='none';

}

function showWithdraw(){

document.getElementById(
'withdrawBox'
).style.display='block';

document.getElementById(
'depositBox'
).style.display='none';

}

function depositNow(){

alert('Deposit Request Submitted');

}

function withdrawNow(){

alert('Withdrawal Request Submitted');

}

function openGame(){

window.location.href="play.html";

}

function historyOpen(){

alert('History Opened');

}

function playColor(){

alert('Color Prediction Started');

}

function playNumber(){

alert('Lucky Number Started');

}

function spinWheel(){

alert('Spin Wheel Started');

}

function jackpotGame(){

alert('Jackpot Started');

}

function sendSupport(){

let name =
document.getElementById('name').value;

let msg =
document.getElementById('msg').value;

if(name=='' || msg==''){

alert('Fill All Fields');

return;

}

localStorage.setItem(
'support_message',
name + ' : ' + msg
);

alert('Message Sent Successfully');

}

</script>

</body>
</html>
