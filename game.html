<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Winner India Game</title>

  <style>
    body{
      margin:0;
      background:black;
      color:white;
      font-family:Arial;
      text-align:center;
    }

    h1{
      margin-top:100px;
      font-size:40px;
    }

    .box{
      margin:30px auto;
      width:300px;
      padding:20px;
      background:#111;
      border-radius:15px;
    }

    button{
      width:100%;
      padding:15px;
      border:none;
      border-radius:10px;
      background:red;
      color:white;
      font-size:18px;
    }
  </style>
</head>
<body>

  <h1>Winner India</h1>

  <div class="box">
    <h2>Game Dashboard</h2>

    <button onclick="startGame()">
      Start Game
    </button>
  </div>

  <script>
    function startGame(){
      alert("Game Started");
    }
  </script>

</body>
</html>
