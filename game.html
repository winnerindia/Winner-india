<script>

function logout(){
window.location.href="index.html";
}

function openDeposit(){
window.location.href="deposit.html";
}

function openWithdraw(){
window.location.href="withdraw.html";
}

function playGame(type){

let amount = prompt("Enter Bet Amount");

if(amount=="" || amount==null){
return;
}

alert("Bet Placed On: " + type + " ₹" + amount);

}

let time=30;

setInterval(()=>{

time--;

document.getElementById("timer").innerHTML=time;

if(time<=0){

time=30;

let result=Math.floor(Math.random()*10);

document.getElementById("result").innerHTML=result;

}

},1000);

</script>
<button class="numberBtn violet" onclick="playGame('0')">0</button>

<button class="numberBtn green" onclick="playGame('1')">1</button>

<button class="numberBtn red" onclick="playGame('2')">2</button>

<button class="numberBtn green" onclick="playGame('3')">3</button>

<button class="numberBtn red" onclick="playGame('4')">4</button>

<button class="numberBtn violet" onclick="playGame('5')">5</button>

<button class="numberBtn red" onclick="playGame('6')">6</button>

<button class="numberBtn green" onclick="playGame('7')">7</button>

<button class="numberBtn red" onclick="playGame('8')">8</button>

<button class="numberBtn green" onclick="playGame('9')">9</button>
<button class="greenBtn" onclick="playGame('Green')">Green</button>

<button class="violetBtn" onclick="playGame('Violet')">Violet</button>

<button class="redBtn" onclick="playGame('Red')">Red</button>

<button class="bigBtn" onclick="playGame('Big')">Big</button>

<button class="smallBtn" onclick="playGame('Small')">Small</button>
