<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Winner India</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#000;
color:white;
padding-bottom:120px;
}

.banner img{
width:100%;
height:230px;
object-fit:cover;
border-radius:0 0 25px 25px;
}

.games{
padding:20px;
}

.games h2{
font-size:50px;
margin-bottom:25px;
}

.game-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.game-card{
background:#1b1b1b;
border-radius:25px;
overflow:hidden;
text-decoration:none;
color:white;
}

.game-card img{
width:100%;
height:220px;
object-fit:cover;
}

.game-card p{
text-align:center;
font-size:30px;
font-weight:bold;
padding:20px;
}

.game-box{
background:#111;
margin:20px;
padding:25px;
border-radius:30px;
text-align:center;
position:relative;
z-index:1;
}

.game-box h1{
font-size:60px;
color:#ffd54f;
margin-bottom:20px;
}

.timer-box p{
font-size:28px;
}

.timer{
font-size:120px;
font-weight:bold;
color:#00ff99;
margin:20px 0;
}

#period{
font-size:32px;
margin-top:15px;
}

.color-buttons{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
margin-top:35px;
}

.color-buttons button{
border:none;
padding:18px 35px;
font-size:28px;
font-weight:bold;
border-radius:18px;
color:white;
}

.green-btn{
background:green;
}

.red-btn{
background:red;
}

.violet-btn{
background:purple;
}

.number-grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:18px;
margin-top:40px;
}

.num{
height:90px;
width:90px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:40px;
font-weight:bold;
margin:auto;
color:white;
}

.green{
background:#00c853;
}

.red{
background:#ff1744;
}

.violet{
background:#aa00ff;
}

.big-small{
display:flex;
justify-content:center;
gap:20px;
margin-top:35px;
flex-wrap:wrap;
}

.big-small button{
border:none;
padding:18px 45px;
font-size:32px;
font-weight:bold;
border-radius:18px;
color:white;
}

.big-btn{
background:#ff9800;
}

.small-btn{
background:#2196f3;
}

.history{
margin-top:45px;
background:#1b1b1b;
padding:25px;
border-radius:25px;
}

.history h2{
font-size:45px;
margin-bottom:25px;
}

.history table{
width:100%;
border-collapse:collapse;
}

.history th{
background:#333;
padding:18px;
font-size:24px;
}

.history td{
padding:18px;
font-size:22px;
text-align:center;
border-bottom:1px solid #444;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#111;
display:flex;
justify-content:space-around;
padding:15px 0;
z-index:1000;
border-top:2px solid #222;
}

.bottom-nav a{
color:white;
text-decoration:none;
text-align:center;
font-size:22px;
}

.bottom-nav div{
font-size:42px;
margin-bottom:5px;
}

</style>
</head>

<body>

<div class="banner">
<img src="https://images.unsplash.com/photo-1511512578047-dfb367046420?w=1200">
</div>

<div class="games">

<h2>Popular Games</h2>

<div class="game-grid">

<a href="#game-section" class="game-card">
<img src="https://images.unsplash.com/photo-1511512578047-dfb367046420?w=500">
<p>Lottery</p>
</a>

<a href="https://google.com" class="game-card">
<img src="https://images.unsplash.com/photo-1596838132731-3301c3fd4317?w=500">
<p>Casino</p>
</a>

<a href="https://youtube.com" class="game-card">
<img src="https://images.unsplash.com/photo-1541278107931-e006523892df?w=500">
<p>Slots</p>
</a>

<a href="https://facebook.com" class="game-card">
<img src="https://images.unsplash.com/photo-1518546305927-5a555bb7020d?w=500">
<p>Spin Wheel</p>
</a>

</div>

</div>

<div class="game-box" id="game-section">

<h1>WinGo 30sec</h1>

<div class="timer-box">

<p>Time Remaining</p>

<div class="timer" id="timer">30</div>

<p id="period">20260522100050266</p>

</div>

<div class="color-buttons">

<button class="green-btn">Green</button>

<button class="violet-btn">Violet</button>

<button class="red-btn">Red</button>

</div>

<div class="number-grid">

<div class="num violet">0</div>
<div class="num green">1</div>
<div class="num red">2</div>
<div class="num green">3</div>
<div class="num red">4</div>

<div class="num violet">5</div>
<div class="num red">6</div>
<div class="num green">7</div>
<div class="num red">8</div>
<div class="num green">9</div>

</div>

<div class="big-small">

<button class="big-btn">Big</button>

<button class="small-btn">Small</button>

</div>

<div class="history">

<h2>Game History</h2>

<table>

<tr>
<th>Period</th>
<th>Number</th>
<th>Result</th>
</tr>

<tr>
<td>50265</td>
<td style="color:#00ff99;">7</td>
<td>BIG</td>
</tr>

<tr>
<td>50264</td>
<td style="color:red;">2</td>
<td>SMALL</td>
</tr>

<tr>
<td>50263</td>
<td style="color:#00ff99;">9</td>
<td>BIG</td>
</tr>

</table>

</div>

</div>

<div class="bottom-nav">

<a href="#">
<div>🏠</div>
Home
</a>

<a href="#">
<div>🎁</div>
Promotion
</a>

<a href="#">
<div>💰</div>
Wallet
</a>

<a href="#">
<div>📞</div>
Support
</a>

</div>

<script>

let time = 30;

setInterval(() => {

time--;

document.getElementById("timer").innerHTML = time;

if(time <= 0){
time = 30;
}

},1000);

document.querySelector(".big-btn").onclick = function(){
alert("BIG Bet Successfully");
}

document.querySelector(".small-btn").onclick = function(){
alert("SMALL Bet Successfully");
}

document.querySelector(".green-btn").onclick = function(){
alert("GREEN Bet Successfully");
}

document.querySelector(".red-btn").onclick = function(){
alert("RED Bet Successfully");
}

document.querySelector(".violet-btn").onclick = function(){
alert("VIOLET Bet Successfully");
}

</script>

</body>
</html>
