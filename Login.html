<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Winner India - Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#1f1f1f;
    font-family:'Poppins',sans-serif;
    color:white;
}

.topbar{
    padding:20px;
    text-align:center;
    background:#2a2a2a;
    color:#f7d774;
    font-size:28px;
    font-weight:700;
}

.container{
    padding:20px;
    margin-top:30px;
}

.login-box{
    background:#2b2b2b;
    border-radius:20px;
    padding:25px;
}

.login-title{
    font-size:28px;
    margin-bottom:10px;
    color:#f7d774;
    text-align:center;
}

.login-subtitle{
    text-align:center;
    color:#aaa;
    margin-bottom:30px;
    font-size:14px;
}

.input-box{
    margin-bottom:20px;
}

.input-box label{
    display:block;
    margin-bottom:8px;
    color:#ddd;
    font-size:14px;
}

.input-box input{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#1e1e1e;
    color:white;
    font-size:16px;
}

.input-box input:focus{
    outline:none;
    border:1px solid #f7d774;
}

.remember{
    display:flex;
    align-items:center;
    margin-bottom:20px;
}

.remember input{
    margin-right:10px;
}

.login-btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:30px;
    background:linear-gradient(90deg,#f7d774,#c89b2d);
    color:black;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

.login-btn:hover{
    opacity:0.9;
}

.register-link{
    text-align:center;
    margin-top:25px;
    color:#ccc;
}

.register-link a{
    color:#f7d774;
    text-decoration:none;
    font-weight:600;
}

.support-box{
    margin-top:30px;
    background:#2b2b2b;
    border-radius:20px;
    padding:20px;
}

.support-box h3{
    color:#f7d774;
    margin-bottom:10px;
}

.support-box p{
    color:#bbb;
    font-size:14px;
    line-height:22px;
}

.bottom-text{
    text-align:center;
    margin-top:30px;
    color:#777;
    font-size:13px;
}

</style>

</head>
<body>

<div class="topbar">
    Winner India
</div>

<div class="container">

    <div class="login-box">

        <div class="login-title">
            Login
        </div>

        <div class="login-subtitle">
            Login with your mobile number and password
        </div>

        <form id="loginForm">

            <div class="input-box">
                <label>Phone Number</label>
                <input type="tel" placeholder="Enter Phone Number" required>
            </div>

            <div class="input-box">
                <label>Password</label>
                <input type="password" placeholder="Enter Password" required>
            </div>

            <div class="remember">
                <input type="checkbox" id="remember">
                <label for="remember">Remember Password</label>
            </div>

            <button type="submit" class="login-btn">
                Log In
            </button>

        </form>

        <div class="register-link">
            Don't have an account?
            <a href="register.html">Register</a>
        </div>

    </div>

    <div class="support-box">

        <h3>Customer Support</h3>

        <p>
            If you forgot your password or face any issue,
            contact support from the support center.
        </p>

    </div>

    <div class="bottom-text">
        © 2026 Winner India. All Rights Reserved.
    </div>

</div>

<script>

document.getElementById("loginForm").addEventListener("submit", function(e){

    e.preventDefault();

    alert("Login Successful");

    window.location.href = "index.html";

});

</script>

</body>
</html>
