<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Winner India Admin Panel</title>

<style>

body{
margin:0;
padding:0;
background:#000;
font-family:Arial;
color:white;
}

.header{
background:#111;
padding:20px;
display:flex;
align-items:center;
gap:15px;
}

.logo{
width:80px;
height:80px;
border-radius:50%;
background:gold;
display:flex;
align-items:center;
justify-content:center;
font-size:38px;
font-weight:bold;
color:black;
}

.title h1{
margin:0;
font-size:38px;
color:gold;
}

.title p{
margin:0;
color:#aaa;
}

.container{
padding:20px;
}

.card{
background:#111;
padding:25px;
border-radius:25px;
margin-bottom:25px;
box-shadow:0 0 15px rgba(255,215,0,0.15);
}

h2{
margin-top:0;
font-size:32px;
}

input{
width:100%;
padding:18px;
border:none;
border-radius:18px;
background:#1d1d1d;
color:white;
font-size:22px;
margin-top:15px;
box-sizing:border-box;
}

button{
width:100%;
padding:18px;
border:none;
border-radius:18px;
font-size:24px;
font-weight:bold;
margin-top:18px;
color:white;
cursor:pointer;
}

.green{
background:linear-gradient(45deg,#00c853,#00e676);
}

.blue{
background:linear-gradient(45deg,#2196f3,#03a9f4);
}

.orange{
background:linear-gradient(45deg,#ff9800,#ffb74d);
}

.red{
background:linear-gradient(45deg,#ff1744,#ff5252);
}

.purple{
background:linear-gradient(45deg,#9c27b0,#e040fb);
}

.box{
background:#1d1d1d;
padding:18px;
border-radius:18px;
margin-top:15px;
font-size:22px;
word-break:break-word;
}

.qr-box{
width:250px;
height:250px;
background:white;
margin:auto;
border-radius:20px;
margin-top:20px;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

.qr-box img{
width:100%;
height:100%;
object-fit:cover;
}

.stat{
background:#1d1d1d;
padding:15px;
border-radius:15px;
margin-top:10px;
font-size:22px;
}

</style>

</head>

<body>

<div class="header">

<div class="logo">
WI
</div>

<div class="title">
<h1>Admin Panel</h1>
<p>Winner India Dashboard</p>
</div>

</div>

<div class="container">

<div class="card">

<h2>Set Game Result</h2>

<input type="number"
id="adminResult"
placeholder="Enter Result Number 0-9">

<button class="green"
onclick="setResult()">
Update Result
</button>

</div>

<div class="card">

<h2>UPI Settings</h2>

<input type="text"
id="upiInput"
placeholder="Enter UPI ID">

<button class="blue"
onclick="saveUpi()">
Save UPI ID
</button>

<div class="qr-box">

<img id="qrImage"
src="https://upload.wikimedia.org/wikipedia/commons/5/5f/Alipay_QR_code.png">

</div>

<input type="text"
id="qrLink"
placeholder="Paste QR Image Link">

<button class="purple"
onclick="changeQr()">
Update QR Image
</button>

</div>

<div class="card">

<h2>Bet Statistics</h2>

<div class="stat">
Green Bet :
<span id="greenCount">0</span>
</div>

<div class="stat">
Red Bet :
<span id="redCount">0</span>
</div>

<div class="stat">
Violet Bet :
<span id="violetCount">0</span>
</div>

<div class="stat">
Big Bet :
<span id="bigCount">0</span>
</div>

<div class="stat">
Small Bet :
<span id="smallCount">0</span>
</div>

</div>

<div class="card">

<h2>Deposit History</h2>

<div id="depositBox">

<div class="box">
No Deposit History
</div>

</div>

</div>

<div class="card">

<h2>Withdraw History</h2>

<div id="withdrawBox">

<div class="box">
No Withdraw History
</div>

</div>

</div>

<div class="card">

<h2>User Bank Details</h2>

<div id="bankBox">

<div class="box">
No Bank Details
</div>

</div>

</div>

<div class="card">

<h2>Game History</h2>

<div id="gameBox">

<div class="box">
No Game History
</div>

</div>

</div>

<button class="orange"
onclick="window.location.href='index.html'">
Open User Panel
</button>

<button class="red"
onclick="clearAll()">
Clear All Data
</button>

</div>

<script>

function setResult(){

let number =
document.getElementById("adminResult").value;

if(number==""){

alert("Enter Result Number");

return;

}

localStorage.setItem(
"adminResult",
number
);

alert("Result Updated ✅");

}

function saveUpi(){

let upi =
document.getElementById("upiInput").value;

if(upi==""){

alert("Enter UPI ID");

return;

}

localStorage.setItem(
"adminUpi",
upi
);

alert("UPI Updated ✅");

}

function changeQr(){

let link =
document.getElementById("qrLink").value;

if(link==""){

alert("Paste QR Image Link");

return;

}

localStorage.setItem(
"qrImage",
link
);

document.getElementById("qrImage").src =
link;

alert("QR Updated ✅");

}

function loadData(){

let qr =
localStorage.getItem("qrImage");

if(qr){

document.getElementById("qrImage").src =
qr;

}

document.getElementById("greenCount")
.innerHTML =
localStorage.getItem("Green") || 0;

document.getElementById("redCount")
.innerHTML =
localStorage.getItem("Red") || 0;

document.getElementById("violetCount")
.innerHTML =
localStorage.getItem("Violet") || 0;

document.getElementById("bigCount")
.innerHTML =
localStorage.getItem("Big") || 0;

document.getElementById("smallCount")
.innerHTML =
localStorage.getItem("Small") || 0;

let deposits =
localStorage.getItem("depositHistory");

if(deposits){

document.getElementById("depositBox")
.innerHTML =
'<div class="box">'+
deposits +
'</div>';

}

let withdraws =
localStorage.getItem("withdrawHistory");

if(withdraws){

document.getElementById("withdrawBox")
.innerHTML =
'<div class="box">'+
withdraws +
'</div>';

}

let games =
localStorage.getItem("gameHistory");

if(games){

document.getElementById("gameBox")
.innerHTML =
'<div class="box">'+
games +
'</div>';

}

let bank =
localStorage.getItem("bankName");

let holder =
localStorage.getItem("holderName");

let account =
localStorage.getItem("accountNumber");

let ifsc =
localStorage.getItem("ifscCode");

if(bank){

document.getElementById("bankBox")
.innerHTML =

'<div class="box">' +

'Bank: ' + bank + '<br><br>' +

'Holder: ' + holder + '<br><br>' +

'Account: ' + account + '<br><br>' +

'IFSC: ' + ifsc +

'</div>';

}

}

function clearAll(){

if(confirm("Clear All Data?")){

localStorage.clear();

alert("All Data Cleared ✅");

location.reload();

}

}

loadData();

</script>

</body>
</html>
