<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Panel</title>

<style>

body{
margin:0;
padding:0;
background:#000;
font-family:Arial;
color:white;
}

.header{
background:#111;
padding:20px;
font-size:45px;
font-weight:bold;
color:gold;
}

.container{
padding:20px;
}

.card{
background:#111;
padding:25px;
border-radius:25px;
margin-bottom:20px;
}

h2{
font-size:32px;
margin-bottom:20px;
}

.history{
background:#1d1d1d;
padding:18px;
border-radius:15px;
margin-top:15px;
font-size:22px;
word-break:break-word;
}

button{
width:100%;
padding:18px;
border:none;
border-radius:15px;
font-size:25px;
font-weight:bold;
margin-top:20px;
background:#ff2d55;
color:white;
}

</style>

</head>

<body>

<div class="header">
Admin Panel
</div>

<div class="container">

<div class="card">

<h2>Deposit History</h2>

<div id="depositBox"></div>

</div>

<div class="card">

<h2>Withdraw History</h2>

<div id="withdrawBox"></div>

</div>

<div class="card">

<h2>User Bank Details</h2>

<div id="bankBox"></div>

</div>

<button onclick="clearAll()">
Clear All Data
</button>

</div>

<script>

function loadData(){

let deposits =
localStorage.getItem("depositHistory");

if(deposits){

document.getElementById("depositBox")
.innerHTML =
'<div class=\"history\">'+
deposits +
'</div>';

}

let withdraws =
localStorage.getItem("withdrawHistory");

if(withdraws){

document.getElementById("withdrawBox")
.innerHTML =
'<div class=\"history\">'+
withdraws +
'</div>';

}

let bank =
localStorage.getItem("bankName");

let holder =
localStorage.getItem("holderName");

let account =
localStorage.getItem("accountNumber");

let ifsc =
localStorage.getItem("ifscCode");

if(bank){

document.getElementById("bankBox")
.innerHTML =

'<div class=\"history\">'+

'Bank: ' + bank + '<br><br>' +

'Holder: ' + holder + '<br><br>' +

'Account: ' + account + '<br><br>' +

'IFSC: ' + ifsc +

'</div>';

}

}

function clearAll(){

localStorage.clear();

alert("All Data Cleared");

location.reload();

}

loadData();

</script>

</body>
</html>
