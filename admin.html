<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="topbar">
<div class="logo">Admin Panel</div>
</div>

<div class="wallet-box">
<h2>Admin Login</h2>
<input type="password" id="adminPassword" placeholder="Admin Password">
<button onclick="adminLogin()">Login</button>
</div>

<div class="wallet-box">
<h2>Telegram Support</h2>
<input type="text" id="telegramLink" placeholder="Telegram Link">
<button onclick="saveTelegram()">Save Support</button>
</div>

<div class="wallet-box">
<h2>Deposit Approval</h2>
<button onclick="approveDeposit()">Approve Deposit</button>
</div>

<div class="wallet-box">
<h2>Withdrawal Approval</h2>
<button onclick="approveWithdraw()">Approve Withdraw</button>
</div>

<script>

function adminLogin(){

let pass = document.getElementById("adminPassword").value;

if(pass == "winner123"){
alert("Admin Login Success");
}else{
alert("Wrong Password");
}

}

function saveTelegram(){

let link = document.getElementById("telegramLink").value;

localStorage.setItem("telegramSupport",link);

alert("Telegram Support Saved");

}

function approveDeposit(){
alert("Deposit Approved");
}

function approveWithdraw(){
alert("Withdrawal Approved");
}

</script>

</body>
</html>
