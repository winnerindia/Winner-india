<!-- admin.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="topbar">
<div class="logo">Admin Panel</div>
</div>

<div class="container">

<div class="box">
<h2>Change UPI ID</h2>

<input type="text" id="upiInput" placeholder="Enter UPI ID">

<button onclick="saveUpi()">Save UPI</button>
</div>

<div class="box">
<h2>Set Result</h2>

<select id="gameResult">
<option>0</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>
</select>

<button onclick="saveResult()">Save Result</button>
</div>

<div class="box">
<h2>Deposit Requests</h2>
<div id="adminDeposit"></div>
</div>

<div class="box">
<h2>Withdraw Requests</h2>
<div id="adminWithdraw"></div>
</div>

</div>

<script src="app.js"></script>
</body>
</html>
