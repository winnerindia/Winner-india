<!DOCTYPE html>
<html>

<head>

<title>Admin Panel</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="topbar">

<div class="logo">Admin Panel</div>

</div>

<div class="container">

<div class="card">

<h2>Change UPI</h2>

<input type="text" id="upiInput" placeholder="Enter UPI">

<button onclick="saveUpi()">Save UPI</button>

</div>

<div class="card">

<h2>Set Game Result</h2>

<select id="resultInput">

<option>0</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>

</select>

<button onclick="setResult()">Save Result</button>

</div>

<div class="card">

<h2>Deposit Requests</h2>

<div id="adminDeposits"></div>

</div>

<div class="card">

<h2>Withdraw Requests</h2>

<div id="adminWithdraws"></div>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
