<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Winner India</title>

<style>

body{
margin:0;
padding:0;
background:#000;
font-family:Arial;
color:white;
}

.header{
background:#111;
padding:20px;
display:flex;
align-items:center;
gap:15px;
}

.logo{
width:80px;
height:80px;
border-radius:50%;
background:gold;
display:flex;
align-items:center;
justify-content:center;
font-size:40px;
font-weight:bold;
color:black;
}

.title h1{
margin:0;
font-size:38px;
color:gold;
}

.title p{
margin:0;
color:#aaa;
font-size:20px;
}

.container{
padding:20px;
}

.card{
background:#111;
padding:25px;
border-radius:25px;
margin-bottom:25px;
box-shadow:0 0 15px rgba(255,215,0,0.15);
}

.balance{
font-size:60px;
font-weight:bold;
color:#00ff88;
margin-top:15px;
}

.btn-row{
display:flex;
gap:15px;
margin-top:20px;
}

button{
flex:1;
padding:18px;
border:none;
border-radius:18px;
font-size:24px;
font-weight:bold;
color:white;
cursor:pointer;
}

.green{
background:linear-gradient(45deg,#00c853,#00e676);
}

.blue{
background:linear-gradient(45deg,#2196f3,#03a9f4);
}

.red{
background:linear-gradient(45deg,#ff1744,#ff5252);
}

.orange{
background:linear-gradient(45deg,#ff9800,#ffb74d);
}

.purple{
background:linear-gradient(45deg,#c218ff,#ea80fc);
}

.game-btn{
width:100%;
margin-top:15px;
}

.number-grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:15px;
margin-top:20px;
}

.number{
padding:20px;
border-radius:18px;
text-align:center;
font-size:35px;
font-weight:bold;
}

.result{
font-size:55px;
font-weight:bold;
margin-top:20px;
}

input{
width:100%;
padding:18px;
border:none;
border-radius:18px;
background:#1d1d1d;
color:white;
font-size:24px;
margin-top:20px;
box-sizing:border-box;
}

.history{
background:#1d1d1d;
padding:18px;
border-radius:18px;
margin-top:15px;
font-size:22px;
}

</style>
</head>

<body>

<div class="header">

<div class="logo">
WI
</div>

<div class="title">
<h1>Winner India</h1>
<p>India's Gaming Platform</p>
</div>

</div>

<div class="container">

<div class="card">

<h2>Wallet Balance</h2>

<div class="balance" id="balance">
₹1000
</div>

<div class="btn-row">

<button class="green"
onclick="window.location.href='deposit.html'">
Deposit
</button>

<button class="blue"
onclick="window.location.href='withdraw.html'">
Withdraw
</button>

</div>

<div class="btn-row">

<button class="orange"
onclick="window.location.href='profile.html'">
Profile
</button>

<button class="purple"
onclick="window.location.href='result-history.html'">
History
</button>

</div>

</div>

<div class="card">

<h2>WinGo Game</h2>

<div class="btn-row">

<button class="green">
30 Sec
</button>

<button class="blue">
1 Min
</button>

</div>

<input type="number"
id="betAmount"
placeholder="Enter Bet Amount">

<div class="result">
<span id="timer">30</span>
</div>

<h1>
Result:
<span id="result">0</span>
</h1>

<div class="number-grid">

<div class="number purple"
onclick="checkWin('violet')">0</div>

<div class="number green"
onclick="checkWin('green')">1</div>

<div class="number red"
onclick="checkWin('red')">2</div>

<div class="number green"
onclick="checkWin('green')">3</div>

<div class="number red"
onclick="checkWin('red')">4</div>

<div class="number purple"
onclick="checkWin('violet')">5</div>

<div class="number red"
onclick="checkWin('red')">6</div>

<div class="number green"
onclick="checkWin('green')">7</div>

<div class="number red"
onclick="checkWin('red')">8</div>

<div class="number green"
onclick="checkWin('green')">9</div>

</div>

<div class="btn-row">

<button class="green game-btn"
onclick="checkWin('green')">
Green
</button>

<button class="purple game-btn"
onclick="checkWin('violet')">
Violet
</button>

</div>

<div class="btn-row">

<button class="red game-btn"
onclick="checkWin('red')">
Red
</button>

<button class="orange game-btn"
onclick="checkWin('big')">
Big
</button>

</div>

<button class="green game-btn"
onclick="checkWin('small')">
Small
</button>

</div>

<div class="card">

<h2>Latest Game History</h2>

<div id="historyBox"></div>

</div>

</div>

<script>

let balance = 1000;

let savedBalance =
localStorage.getItem("balance");

if(savedBalance){
balance = parseInt(savedBalance);
}

updateBalance();

function updateBalance(){

document.getElementById("balance")
.innerText = "₹" + balance;

}

function checkWin(type){

let amount =
parseInt(
document.getElementById("betAmount").value
);

if(!amount || amount <= 0){

alert("Enter Bet Amount");

return;

}

if(amount > balance){

alert("Insufficient Balance");

return;

}

let result =
Math.floor(Math.random() * 10);

document.getElementById("result")
.innerText = result;

let win = false;

if(type=="small" && result <= 4){
win = true;
}

if(type=="big" && result >= 5){
win = true;
}

if(type=="red" && [2,4,6,8].includes(result)){
win = true;
}

if(type=="green" && [1,3,7,9].includes(result)){
win = true;
}

if(type=="violet" && [0,5].includes(result)){
win = true;
}

if(win){

balance += amount;

alert("Win ₹" + amount + " ✅");

}else{

balance -= amount;

alert("Lose ₹" + amount);

}

localStorage.setItem("balance", balance);

updateBalance();

saveHistory(type,result,amount,win);

}

function saveHistory(type,result,amount,win){

let text =
(win ? "WIN ✅" : "LOSE ❌") +
"<br>Bet: " + type +
"<br>Result: " + result +
"<br>Amount: ₹" + amount +
"<hr>";

let old =
localStorage.getItem("gameHistory");

if(old == null){
old = "";
}

localStorage.setItem(
"gameHistory",
text + old
);

loadHistory();

}

function loadHistory(){

let data =
localStorage.getItem("gameHistory");

if(data){

document.getElementById("historyBox")
.innerHTML = data;

}

}

loadHistory();

let time = 30;

setInterval(function(){

time--;

document.getElementById("timer")
.innerText = time;

if(time <= 0){

time = 30;

}

},1000);

</script>

</body>
</html>
