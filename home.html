<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Winner India</title>

<style>

body{
margin:0;
padding:0;
background:#000;
font-family:Arial;
color:white;
}

.topbar{
background:#111;
padding:20px;
display:flex;
align-items:center;
gap:15px;
}

.logo{
width:80px;
height:80px;
border-radius:50%;
background:gold;
display:flex;
align-items:center;
justify-content:center;
font-size:38px;
font-weight:bold;
color:black;
}

.topbar h1{
margin:0;
font-size:40px;
color:gold;
}

.topbar p{
margin:0;
font-size:20px;
color:#aaa;
}

.card{
background:#111;
margin:20px;
padding:20px;
border-radius:25px;
box-shadow:0 0 15px rgba(255,215,0,0.2);
}

h2{
font-size:28px;
margin-bottom:15px;
}

.balance{
font-size:50px;
font-weight:bold;
color:#00ff99;
margin-bottom:20px;
}

.btn-row{
display:flex;
gap:15px;
margin-top:15px;
}

button{
flex:1;
padding:18px;
border:none;
border-radius:18px;
font-size:24px;
font-weight:bold;
color:white;
cursor:pointer;
}

.green-btn{
background:linear-gradient(45deg,#00c853,#00e676);
}

.blue-btn{
background:linear-gradient(45deg,#2196f3,#03a9f4);
}

.red-btn{
background:linear-gradient(45deg,#ff1744,#ff5252);
}

.orange-btn{
background:linear-gradient(45deg,#ff9800,#ffb74d);
}

.purple-btn{
background:linear-gradient(45deg,#9c27b0,#e040fb);
}

input{
width:100%;
padding:18px;
border:none;
border-radius:18px;
font-size:24px;
margin-top:15px;
background:#1e1e1e;
color:white;
box-sizing:border-box;
}

.timer{
font-size:70px;
font-weight:bold;
margin-top:20px;
}

.result{
font-size:40px;
margin-top:20px;
font-weight:bold;
}

.numbers{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:15px;
margin-top:20px;
}

.number-btn{
height:90px;
border-radius:20px;
font-size:38px;
font-weight:bold;
}

.green{
background:linear-gradient(45deg,#00c853,#00e676);
}

.red{
background:linear-gradient(45deg,#ff1744,#ff5252);
}

.violet{
background:linear-gradient(45deg,#9c27b0,#e040fb);
}

.history-box{
background:#1b1b1b;
padding:15px;
border-radius:15px;
margin-top:10px;
font-size:20px;
}

.full{
width:100%;
margin-top:15px;
}

</style>

</head>
<body>

<div class="topbar">

<div class="logo">
WI
</div>

<div>
<h1>Winner India</h1>
<p>India's Gaming Platform</p>
</div>

</div>

<div class="card">

<h2>Wallet</h2>

<div class="balance" id="walletBalance">
₹1000
</div>

<div class="btn-row">

<button class="green-btn"
onclick="window.location.href='deposit.html'">
Deposit
</button>

<button class="blue-btn"
onclick="window.location.href='withdraw.html'">
Withdraw
</button>

</div>

<button class="orange-btn full"
onclick="window.location.href='profile.html'">
Profile
</button>

<button class="red-btn full"
onclick="logout()">
Logout
</button>

</div>

<div class="card">

<h2>WinGo Game</h2>

<div class="btn-row">

<button class="green-btn">
30 Sec
</button>

<button class="blue-btn">
1 Min
</button>

</div>

<input type="number"
id="betAmount"
placeholder="Enter Bet Amount">

<div class="timer"
id="timer">
30
</div>

<div class="result">
Result:
<span id="result">
0
</span>
</div>

<div class="numbers">

<button class="number-btn violet"
onclick="placeBet('0')">
0
</button>

<button class="number-btn green"
onclick="placeBet('1')">
1
</button>

<button class="number-btn red"
onclick="placeBet('2')">
2
</button>

<button class="number-btn green"
onclick="placeBet('3')">
3
</button>

<button class="number-btn red"
onclick="placeBet('4')">
4
</button>

<button class="number-btn violet"
onclick="placeBet('5')">
5
</button>

<button class="number-btn red"
onclick="placeBet('6')">
6
</button>

<button class="number-btn green"
onclick="placeBet('7')">
7
</button>

<button class="number-btn red"
onclick="placeBet('8')">
8
</button>

<button class="number-btn green"
onclick="placeBet('9')">
9
</button>

</div>

<div class="btn-row">

<button class="green-btn"
onclick="placeBet('green')">
Green
</button>

<button class="purple-btn"
onclick="placeBet('violet')">
Violet
</button>

</div>

<div class="btn-row">

<button class="red-btn"
onclick="placeBet('red')">
Red
</button>

<button class="orange-btn"
onclick="placeBet('big')">
Big
</button>

</div>

<button class="green-btn full"
onclick="placeBet('small')">
Small
</button>

</div>

<div class="card">

<h2>Latest Game History</h2>

<div id="gameHistory">

<div class="history-box">
No History
</div>

</div>

</div>

<script>

let balance = 1000;

let timer = 30;

function updateBalance(){

document.getElementById("walletBalance")
.innerHTML = "₹" + balance;

}

setInterval(()=>{

timer--;

if(timer <= 0){

timer = 30;

let random =
Math.floor(Math.random()*10);

document.getElementById("result")
.innerHTML = random;

}

document.getElementById("timer")
.innerHTML = timer;

},1000);

function placeBet(type){

let amount =
parseInt(document.getElementById("betAmount").value);

if(!amount || amount <= 0){

alert("Enter Bet Amount");

return;

}

if(amount > balance){

alert("Low Balance");

return;

}

balance -= amount;

updateBalance();

let result =
parseInt(document.getElementById("result").innerHTML);

let win = false;

if(type=="green" && [1,3,7,9].includes(result))
win = true;

if(type=="red" && [2,4,6,8].includes(result))
win = true;

if(type=="violet" && [0,5].includes(result))
win = true;

if(type=="big" && result>=5)
win = true;

if(type=="small" && result<5)
win = true;

if(type==result.toString())
win = true;

if(win){

let prize = amount * 2;

balance += prize;

updateBalance();

alert("Win ₹"+prize);

addHistory(type,amount,"WIN");

}else{

alert("Lose");

addHistory(type,amount,"LOSE");

}

}

function addHistory(type,amount,status){

let history =
document.getElementById("gameHistory");

history.innerHTML =

`
<div class="history-box">
Bet: ${type} <br>
Amount: ₹${amount} <br>
Status: ${status}
</div>
` + history.innerHTML;

}

function logout(){

window.location.href="index.html";

}

updateBalance();

</script>

</body>
</html>
