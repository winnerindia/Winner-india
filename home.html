<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Winner India Home</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="topbar">
<div class="logoBox">
<div class="logo">WI</div>

<div>
<h1>Winner India</h1>
<p>India's Gaming Platform</p>
</div>

</div>
</div>

<div class="card">

<h2>Wallet</h2>

<h1>₹1000</h1>

<div class="walletBtns">

<button class="depositBtn" onclick="openDeposit()">
Deposit
</button>

<button class="withdrawBtn" onclick="openWithdraw()">
Withdraw
</button>

</div>

<button class="logoutBtn" onclick="logout()">
Logout
</button>

</div>

<div class="card">

<h2>WinGo Game</h2>

<div class="timerBox">

<button class="timeBtn active">
30 Sec
</button>

<button class="timeBtn">
1 Min
</button>

</div>

<h1 id="timer">30</h1>

<h2>
Result:
<span id="result">0</span>
</h2>

<div class="numberGrid">

<button class="numberBtn violet">
0
</button>

<button class="numberBtn green">
1
</button>

<button class="numberBtn red">
2
</button>

<button class="numberBtn green">
3
</button>

<button class="numberBtn red">
4
</button>

<button class="numberBtn violet">
5
</button>

<button class="numberBtn red">
6
</button>

<button class="numberBtn green">
7
</button>

<button class="numberBtn red">
8
</button>

<button class="numberBtn green">
9
</button>

</div>

<div class="colorGrid">

<button class="greenBtn">
Green
</button>

<button class="violetBtn">
Violet
</button>

<button class="redBtn">
Red
</button>

<button class="bigBtn">
Big
</button>

<button class="smallBtn">
Small
</button>

</div>

</div>

<div class="card">

<h2>Deposit History</h2>

<div id="depositHistory"></div>

</div>

<div class="card">

<h2>Withdraw History</h2>

<div id="withdrawHistory"></div>

</div>

<script>

function logout(){

window.location.href="index.html";

}

function openDeposit(){

window.location.href="deposit.html";

}

function openWithdraw(){

window.location.href="withdraw.html";

}

let time=30;

setInterval(()=>{

time--;

document.getElementById("timer").innerHTML=time;

if(time<=0){

time=30;

let result=Math.floor(Math.random()*10);

document.getElementById("result").innerHTML=result;

}

},1000);

let deposits=JSON.parse(localStorage.getItem("deposits")) || [];

let depositHTML="";

deposits.forEach(d=>{

depositHTML += `
<p>
₹${d.amount} |
${d.status} |
${d.date}
</p>
`;

});

document.getElementById("depositHistory").innerHTML=depositHTML;

let withdraws=JSON.parse(localStorage.getItem("withdraws")) || [];

let withdrawHTML="";

withdraws.forEach(w=>{

withdrawHTML += `
<p>
₹${w.amount} |
${w.status} |
${w.date}
</p>
`;

});

document.getElementById("withdrawHistory").innerHTML=withdrawHTML;

</script>

</body>
</html>
