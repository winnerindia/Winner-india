<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Withdraw - Winner India</title>

<style>

body{
margin:0;
padding:0;
background:#000;
font-family:Arial;
color:white;
}

.header{
background:#111;
padding:20px;
font-size:45px;
font-weight:bold;
color:gold;
}

.container{
padding:20px;
}

.card{
background:#111;
padding:25px;
border-radius:25px;
margin-bottom:20px;
}

.info{
background:#1d1d1d;
padding:18px;
border-radius:15px;
font-size:24px;
margin-bottom:15px;
}

input{
width:100%;
padding:18px;
border:none;
border-radius:15px;
background:#1d1d1d;
color:white;
font-size:24px;
margin-top:15px;
box-sizing:border-box;
}

button{
width:100%;
padding:18px;
border:none;
border-radius:15px;
font-size:28px;
font-weight:bold;
margin-top:20px;
color:white;
background:#1ea7ff;
}

.history{
background:#1d1d1d;
padding:15px;
border-radius:15px;
margin-top:15px;
font-size:22px;
}

</style>
</head>

<body>

<div class="header">
Withdraw
</div>

<div class="container">

<div class="card">

<div class="info" id="bankName">
Bank : Not Added
</div>

<div class="info" id="holderName">
Holder : ---
</div>

<div class="info" id="accountNumber">
Account : ---
</div>

<div class="info" id="ifscCode">
IFSC : ---
</div>

<input type="number" id="amount" placeholder="Enter Withdraw Amount">

<button onclick="withdrawMoney()">
Submit Withdraw
</button>

</div>

<div class="card">

<h2>Withdraw History</h2>

<div id="historyBox"></div>

</div>

</div>

<script>

let bank = localStorage.getItem("bankName");
let holder = localStorage.getItem("holderName");
let account = localStorage.getItem("accountNumber");
let ifsc = localStorage.getItem("ifscCode");

if(bank){

document.getElementById("bankName").innerText =
"Bank : " + bank;

document.getElementById("holderName").innerText =
"Holder : " + holder;

document.getElementById("accountNumber").innerText =
"Account : " + account;

document.getElementById("ifscCode").innerText =
"IFSC : " + ifsc;

}

function withdrawMoney(){

let amount =
document.getElementById("amount").value;

if(amount == ""){
alert("Enter Amount");
return;
}

let data =
"₹" + amount + " Withdraw Requested";

let old =
localStorage.getItem("withdrawHistory");

if(old == null){
old = "";
}

localStorage.setItem(
"withdrawHistory",
data + "<br><br>" + old
);

alert("Withdraw Request Submitted ✅");

loadHistory();

}

function loadHistory(){

let history =
localStorage.getItem("withdrawHistory");

if(history){

document.getElementById("historyBox").innerHTML =
history;

}

}

loadHistory();

</script>

</body>
</html>
