<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Winner India - Profile</title>

<style>

body{
margin:0;
padding:0;
background:#000;
font-family:Arial;
color:white;
}

.header{
padding:20px;
background:#111;
display:flex;
align-items:center;
gap:15px;
}

.logo{
width:80px;
height:80px;
border-radius:50%;
background:gold;
display:flex;
align-items:center;
justify-content:center;
font-size:38px;
font-weight:bold;
color:#000;
}

.title h1{
margin:0;
color:gold;
font-size:34px;
}

.title p{
margin:0;
color:#aaa;
}

.container{
padding:20px;
}

.card{
background:#111;
border-radius:25px;
padding:25px;
margin-bottom:20px;
box-shadow:0 0 20px rgba(255,255,0,0.1);
}

.profile-top{
text-align:center;
}

.profile-top h2{
font-size:32px;
margin-bottom:10px;
}

.profile-top p{
font-size:22px;
color:#bbb;
}

.balance{
font-size:55px;
font-weight:bold;
color:#00ff88;
margin-top:20px;
}

.info{
background:#1b1b1b;
padding:20px;
border-radius:18px;
margin-top:15px;
font-size:24px;
}

button{
width:100%;
padding:20px;
border:none;
border-radius:18px;
font-size:28px;
font-weight:bold;
margin-top:18px;
color:white;
cursor:pointer;
}

.green{
background:#00d95f;
}

.blue{
background:#1ea7ff;
}

.orange{
background:#ffb02e;
}

.red{
background:#ff2d55;
}

.purple{
background:#b100ff;
}

</style>
</head>

<body>

<div class="header">

<div class="logo">
WI
</div>

<div class="title">
<h1>Winner India</h1>
<p>India's Gaming Platform</p>
</div>

</div>

<div class="container">

<div class="card profile-top">

<h2 id="userEmail">
user@gmail.com
</h2>

<div class="balance">
₹1000
</div>

</div>

<div class="card">

<div class="info">
User ID : 1001
</div>

<div class="info">
VIP Level : VIP 1
</div>

<div class="info">
Account Status : Active
</div>

<button class="green" onclick="addBank()">
Add Bank Account
</button>

<button class="blue" onclick="window.location.href='game-history.html'">
Game History
</button>

<button class="orange" onclick="window.location.href='transaction-history.html'">
Transaction History
</button>

<button class="purple" onclick="showBank()">
View Bank Account
</button>

<button class="red" onclick="logout()">
Logout
</button>

</div>

</div>

<script>

let email = localStorage.getItem("userEmail");

if(email){
document.getElementById("userEmail").innerText = email;
}

function addBank(){

let bank = prompt("Enter Bank Name");
if(!bank) return;

let holder = prompt("Enter Account Holder Name");
if(!holder) return;

let account = prompt("Enter Account Number");
if(!account) return;

let ifsc = prompt("Enter IFSC Code");
if(!ifsc) return;

localStorage.setItem("bankName", bank);
localStorage.setItem("holderName", holder);
localStorage.setItem("accountNumber", account);
localStorage.setItem("ifscCode", ifsc);

alert("Bank Account Added Successfully ✅");

}

function showBank(){

let bank = localStorage.getItem("bankName");
let holder = localStorage.getItem("holderName");
let account = localStorage.getItem("accountNumber");
let ifsc = localStorage.getItem("ifscCode");

if(bank){

alert(
"Bank Name: " + bank +
"\nHolder: " + holder +
"\nAccount: " + account +
"\nIFSC: " + ifsc
);

}else{

alert("No Bank Account Added");

}

}

function logout(){

localStorage.removeItem("userEmail");

window.location.href = "index.html";

}

</script>

</body>
</html>
