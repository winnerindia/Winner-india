<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Winner India</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="topbar">
<div class="logo">Winner India</div>
</div>

<div class="container">

<div id="authBox" class="box">
<h2>Login / Signup</h2>

<input type="email" id="email" placeholder="Enter Email">

<input type="password" id="password" placeholder="Enter Password">

<button onclick="signup()">Signup</button>

<button onclick="login()">Login</button>
</div>

<div id="userPanel" style="display:none;">

<div class="box">
<h2>ID: <span id="userId"></span></h2>
<p id="userEmail"></p>

<h1>₹<span id="wallet">1000</span></h1>

<button onclick="openDeposit()">Deposit</button>

<button onclick="openWithdraw()">Withdraw</button>

<button class="red" onclick="logout()">Logout</button>
</div>

<div class="box">
<h2>WinGo 30Sec</h2>

<h1 id="timer">30</h1>

<h2>Result: <span id="result">0</span></h2>

<div class="bet-grid">

<button class="green" onclick="bet('GREEN')">GREEN</button>

<button class="red" onclick="bet('RED')">RED</button>

<button class="violet" onclick="bet('VIOLET')">VIOLET</button>

<button onclick="bet('BIG')">BIG</button>

<button onclick="bet('SMALL')">SMALL</button>

</div>
</div>

<div class="box">
<h2>Deposit History</h2>
<div id="depositHistory"></div>
</div>

<div class="box">
<h2>Withdraw History</h2>
<div id="withdrawHistory"></div>
</div>

</div>

</div>

<script src="app.js"></script>
</body>
</html>
