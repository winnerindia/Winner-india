<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Winner India</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#000;
color:white;
}

/* LOGIN PAGE */

.login-page{
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.login-box{
width:100%;
max-width:350px;
background:#151515;
padding:30px;
border-radius:25px;
border:1px solid #333;
text-align:center;
}

.logo{
font-size:28px;
font-weight:bold;
color:#ff2e2e;
margin-bottom:30px;
}

.login-box input{
width:100%;
padding:16px;
margin-bottom:18px;
border:none;
outline:none;
border-radius:14px;
background:#222;
color:white;
font-size:16px;
}

.login-btn{
width:100%;
padding:16px;
border:none;
border-radius:14px;
background:#ff1a1a;
color:white;
font-size:20px;
font-weight:bold;
cursor:pointer;
}

.login-box p{
margin-top:20px;
color:#aaa;
font-size:14px;
}

/* HOME PAGE */

#homePage{
display:none;
padding-bottom:90px;
}

.top{
background:#111;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #333;
}

.balance{
background:#222;
padding:10px 15px;
border-radius:12px;
font-size:15px;
}

.banner{
margin:15px;
background:linear-gradient(45deg,#ff0000,#ff6600);
padding:30px;
border-radius:25px;
text-align:center;
}

.banner h1{
font-size:42px;
margin-bottom:10px;
}

.banner p{
font-size:16px;
margin-bottom:20px;
}

.play-btn{
background:white;
color:black;
padding:15px 35px;
border:none;
border-radius:15px;
font-size:22px;
font-weight:bold;
}

.section-title{
padding:15px;
font-size:22px;
font-weight:bold;
}

.games{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
padding:0 15px;
}

.card{
background:#151515;
padding:25px;
border-radius:20px;
border:1px solid #333;
text-align:center;
}

.card h3{
margin-bottom:18px;
font-size:20px;
}

.card button{
background:#ff2e2e;
border:none;
padding:12px 24px;
border-radius:12px;
color:white;
font-size:18px;
}

.vip{
margin:20px 15px;
background:#151515;
padding:25px;
border-radius:25px;
border:1px solid #333;
}

.vip h2{
color:gold;
margin-bottom:10px;
font-size:24px;
}

.bottom{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#111;
display:flex;
justify-content:space-around;
padding:14px 0;
border-top:1px solid #333;
}

.bottom a{
color:white;
text-decoration:none;
font-size:16px;
}

.recharge{
position:fixed;
right:20px;
bottom:90px;
background:#ff1a1a;
width:70px;
height:70px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:45px;
box-shadow:0 0 25px red;
}

</style>
</head>

<body>

<!-- LOGIN PAGE -->

<div class="login-page" id="loginPage">

<div class="login-box">

<div class="logo">Winner India</div>

<input type="text" id="mobile" placeholder="Mobile Number">

<input type="password" placeholder="Password">

<button class="login-btn" id="login-btn">
Login
</button>

<p>India's Fastest Gaming Platform</p>

</div>

</div>

<!-- HOME PAGE -->

<div id="homePage">

<div class="top">

<div class="logo">Winner India</div>

<div class="balance">₹ 10,500</div>

</div>

<div class="banner">

<h1>Play & Win</h1>

<p>India's Fastest Gaming Platform</p>

<button class="play-btn">Play Now</button>

</div>

<div class="section-title">Popular Games</div>

<div class="games">

<div class="card">
<h3>Color Prediction</h3>
<button>Play</button>
</div>

<div class="card">
<h3>Lottery Game</h3>
<button>Play</button>
</div>

<div class="card">
<h3>Crash Game</h3>
<button>Play</button>
</div>

<div class="card">
<h3>Spin Win</h3>
<button>Play</button>
</div>

</div>

<div class="vip">

<h2>VIP Rewards</h2>

<p>Recharge more and unlock VIP bonuses daily.</p>

</div>

<div class="recharge">+</div>

<div class="bottom">

<a href="#">Home</a>
<a href="#">Games</a>
<a href="#">Wallet</a>
<a href="#">Profile</a>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
signInWithPhoneNumber,
RecaptchaVerifier
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {

apiKey: "PASTE_YOUR_FULL_FIREBASE_API_KEY_HERE",

authDomain: "winnerindia-b60c1.firebaseapp.com",

projectId: "winnerindia-b60c1",

storageBucket: "winnerindia-b60c1.appspot.com",

messagingSenderId: "998173148826",

appId: "1:998173148826:web:2b3b6d6e90b0",

measurementId: "G-3M2D8RDVXX"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

window.recaptchaVerifier = new RecaptchaVerifier(
auth,
'login-btn',
{
size: 'invisible'
}
);

document.getElementById("login-btn").addEventListener("click", async function(){

const number = document.getElementById("mobile").value;

if(number.length !== 10){
alert("10 digit mobile number डालो");
return;
}

try{

const confirmationResult = await signInWithPhoneNumber(
auth,
"+91" + number,
window.recaptchaVerifier
);

const code = prompt("OTP Enter करें");

await confirmationResult.confirm(code);

document.getElementById("loginPage").style.display="none";

document.getElementById("homePage").style.display="block";

alert("Login Successful");

}catch(error){

alert(error.message);

}

});

</script>

</body>
</html>
