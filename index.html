<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Winner India</title>

<style>

body{
margin:0;
padding:0;
background:#000;
font-family:Arial;
color:white;
}

.header{
padding:20px;
text-align:center;
font-size:32px;
font-weight:bold;
color:gold;
background:#111;
}

.balance{
margin:20px;
padding:20px;
background:#1c1c1c;
border-radius:15px;
text-align:center;
font-size:28px;
}

.banner{
padding:15px;
}

.banner img{
width:100%;
height:180px;
object-fit:cover;
border-radius:15px;
}

.games{
padding:15px;
}

.games h2{
margin-bottom:15px;
}

.game-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.game-card{
background:#1c1c1c;
border-radius:15px;
overflow:hidden;
text-decoration:none;
}

.game-card img{
width:100%;
height:140px;
object-fit:cover;
}

.game-card p{
text-align:center;
padding:10px;
font-size:20px;
font-weight:bold;
color:white;
}

.game-box{
margin:20px;
padding:20px;
background:#111;
border-radius:20px;
text-align:center;
}

.timer{
font-size:60px;
color:#00ff99;
font-weight:bold;
}

.result{
font-size:40px;
font-weight:bold;
margin:20px 0;
}

.btns{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
}

.btn{
padding:15px 25px;
border:none;
border-radius:12px;
font-size:20px;
font-weight:bold;
color:white;
}

.green{
background:green;
}

.red{
background:red;
}

.violet{
background:purple;
}

.big{
background:orange;
}

.small{
background:#0099ff;
}

.history{
margin-top:20px;
background:#1c1c1c;
padding:15px;
border-radius:15px;
}

.bottom-nav{
position:fixed;
bottom:0;
width:100%;
background:#111;
display:flex;
justify-content:space-around;
padding:12px 0;
}

.bottom-nav a{
color:white;
text-decoration:none;
font-size:18px;
text-align:center;
}

</style>

</head>
<body>

<div class="header">
Winner India
</div>

<div class="balance">
Balance: ₹950
</div>

<div class="banner">
<img src="https://images.unsplash.com/photo-1511512578047-dfb367046420?w=1200">
</div>

<div class="games">

<h2>Popular Games</h2>

<div class="game-grid">

<a href="#" class="game-card">
<img src="https://images.unsplash.com/photo-1511512578047-dfb367046420?w=500">
<p>Lottery</p>
</a>

<a href="#" class="game-card">
<img src="https://images.unsplash.com/photo-1596838132731-3301c3fd4317?w=500">
<p>Casino</p>
</a>

<a href="#" class="game-card">
<img src="https://images.unsplash.com/photo-1541278107931-e006523892df?w=500">
<p>Slots</p>
</a>

<a href="#" class="game-card">
<img src="https://images.unsplash.com/photo-1518546305927-5a555bb7020d?w=500">
<p>Spin Wheel</p>
</a>

</div>

</div>

<div class="game-box">

<h1>Winner India</h1>

<p>Next Result In</p>

<div class="timer" id="timer">
30
</div>

<div class="result" id="result">
BIG
</div>

<div class="btns">
<button class="btn green">GREEN</button>
<button class="btn red">RED</button>
<button class="btn violet">VIOLET</button>
<button class="btn big">BIG</button>
<button class="btn small">SMALL</button>
</div>

<div class="history">
<h2>History</h2>
<p id="history">BIG</p>
</div>

</div>

<div class="bottom-nav">
<a href="#">🏠<br>Home</a>
<a href="#">🎁<br>Promotion</a>
<a href="#">💰<br>Wallet</a>
<a href="#">📞<br>Support</a>
</div>

<script>

let time = 30;

setInterval(() => {

time--;

document.getElementById("timer").innerHTML = time;

if(time <= 0){

time = 30;

let results = ["BIG","SMALL"];

let random = results[Math.floor(Math.random()*results.length)];

document.getElementById("result").innerHTML = random;

document.getElementById("history").innerHTML = random;

}

},1000);

</script>

</body>
</html>
