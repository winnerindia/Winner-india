<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Winner India Login</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#0f0f0f;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.login-box{
width:90%;
max-width:350px;
background:#1c1c1c;
padding:30px;
border-radius:20px;
border:1px solid #333;
text-align:center;
}

.logo{
font-size:35px;
font-weight:bold;
color:#ff2e2e;
margin-bottom:25px;
}

input{
width:100%;
padding:14px;
margin:10px 0;
border:none;
border-radius:12px;
background:#2a2a2a;
color:white;
font-size:16px;
}

button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:12px;
background:#ff1a1a;
color:white;
font-size:18px;
font-weight:bold;
}

p{
margin-top:15px;
color:#aaa;
font-size:14px;
}
</style>
</head>

<body>

<div class="login-box">

<div class="logo">Winner India</div>

<input type="text" placeholder="Mobile Number">

<input type="password" placeholder="Password">

<button onclick="login()">Login</button>

<p>India's Fastest Gaming Platform</p>

</div>

<script>
function login(){
window.location.href="home.html";
}
</script>

</body>
</html>
