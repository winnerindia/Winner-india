<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Winner India</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#000;
color:white;
padding-bottom:100px;
}

/* HEADER */

.header{
background:#111;
padding:20px;
font-size:32px;
font-weight:bold;
color:#ffd700;
display:flex;
justify-content:space-between;
align-items:center;
}

.logout-btn{
background:red;
border:none;
padding:10px 20px;
border-radius:10px;
color:white;
font-size:18px;
}

/* LOGIN */

#loginPage{
padding:20px;
}

.login-box{
background:#111;
padding:20px;
border-radius:20px;
margin-top:40px;
}

.login-box h1{
color:#ffd700;
margin-bottom:20px;
text-align:center;
}

input{
width:100%;
padding:15px;
border:none;
border-radius:12px;
margin-top:15px;
font-size:18px;
}

.btn{
width:100%;
padding:15px;
border:none;
border-radius:12px;
font-size:20px;
font-weight:bold;
margin-top:15px;
color:white;
}

.login-btn{
background:#00aaff;
}

.signup-btn{
background:#ff9800;
}

/* WALLET */

.card{
background:#111;
margin:20px;
padding:20px;
border-radius:20px;
}

.wallet{
font-size:40px;
color:#00ff99;
text-align:center;
margin-top:10px;
}

.deposit-btn{
background:#00cc44;
}

.withdraw-btn{
background:red;
}

/* PROFILE */

.profile-box{
text-align:center;
}

.profile-box h2{
color:#ffd700;
margin-bottom:15px;
}

.profile-box p{
font-size:22px;
margin-top:10px;
}

/* GAME */

.game-box{
background:#111;
margin:20px;
padding:20px;
border-radius:20px;
text-align:center;
}

.game-box h1{
color:#ffd700;
}

.timer{
font-size:90px;
color:#00ff99;
font-weight:bold;
margin-top:20px;
}

.period{
margin-top:10px;
font-size:22px;
}

.color-buttons{
display:flex;
gap:10px;
justify-content:center;
flex-wrap:wrap;
margin-top:20px;
}

.color-buttons button{
padding:15px 25px;
border:none;
border-radius:15px;
font-size:24px;
font-weight:bold;
color:white;
}

.green{
background:green;
}

.red{
background:red;
}

.violet{
background:purple;
}

.number-grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:15px;
margin-top:30px;
}

.num{
width:70px;
height:70px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:35px;
font-weight:bold;
margin:auto;
color:white;
}

.big-small{
display:flex;
gap:10px;
margin-top:30px;
}

.big-small button{
flex:1;
padding:18px;
border:none;
border-radius:15px;
font-size:28px;
font-weight:bold;
color:white;
}

.big-btn{
background:orange;
}

.small-btn{
background:#2196f3;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #333;
padding:10px;
font-size:16px;
text-align:center;
}

/* MENU */

.bottom-menu{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#111;
display:flex;
justify-content:space-around;
padding:15px 0;
}

.bottom-menu div{
text-align:center;
font-size:20px;
}

</style>
</head>

<body>

<!-- LOGIN PAGE -->

<div id="loginPage">

<div class="login-box">

<h1>Winner India Login</h1>

<input type="email" id="email" placeholder="Enter Email">

<input type="password" id="password" placeholder="Enter Password">

<button class="btn login-btn" onclick="login()">Login</button>

<button class="btn signup-btn" onclick="signup()">Signup</button>

</div>

</div>

<!-- GAME PAGE -->

<div id="gamePage" style="display:none;">

<div class="header">

Winner India

<button class="logout-btn" onclick="logout()">Logout</button>

</div>

<!-- PROFILE -->

<div class="card profile-box">

<h2>User Profile</h2>

<p><b>ID No:</b> <span id="userId"></span></p>

<p><b>Email:</b> <span id="userEmail"></span></p>

</div>

<!-- WALLET -->

<div class="card">

<h2 style="text-align:center;">Wallet Balance</h2>

<div class="wallet" id="wallet">1000</div>

<button class="btn deposit-btn" onclick="depositMoney()">Deposit</button>

<button class="btn withdraw-btn" onclick="withdrawMoney()">Withdraw</button>

</div>

<!-- GAME -->

<div class="game-box">

<h1>WinGo 30sec</h1>

<p>Time Remaining</p>

<div class="timer" id="timer">30</div>

<div class="period" id="period">20260522100050266</div>

<div class="color-buttons">

<button class="green" onclick="bet('GREEN')">Green</button>

<button class="violet" onclick="bet('VIOLET')">Violet</button>

<button class="red" onclick="bet('RED')">Red</button>

</div>

<div class="number-grid">

<div class="num violet" onclick="bet(0)">0</div>
<div class="num green" onclick="bet(1)">1</div>
<div class="num red" onclick="bet(2)">2</div>
<div class="num green" onclick="bet(3)">3</div>
<div class="num red" onclick="bet(4)">4</div>
<div class="num violet" onclick="bet(5)">5</div>
<div class="num red" onclick="bet(6)">6</div>
<div class="num green" onclick="bet(7)">7</div>
<div class="num red" onclick="bet(8)">8</div>
<div class="num green" onclick="bet(9)">9</div>

</div>

<div class="big-small">

<button class="big-btn" onclick="bet('BIG')">Big</button>

<button class="small-btn" onclick="bet('SMALL')">Small</button>

</div>

</div>

<!-- DEPOSIT HISTORY -->

<div class="card">

<h2>Deposit History</h2>

<table>

<tr>
<th>ID</th>
<th>Email</th>
<th>UTR</th>
<th>Date</th>
<th>Status</th>
</tr>

<tbody id="depositHistory"></tbody>

</table>

</div>

<!-- WITHDRAW HISTORY -->

<div class="card">

<h2>Withdrawal History</h2>

<table>

<tr>
<th>ID</th>
<th>Name</th>
<th>Bank</th>
<th>Account</th>
<th>IFSC</th>
<th>Amount</th>
<th>Date</th>
</tr>

<tbody id="withdrawHistory"></tbody>

</table>

</div>

<!-- MENU -->

<div class="bottom-menu">

<div>🏠<br>Home</div>

<div>🎁<br>Promotion</div>

<div>💰<br>Wallet</div>

<div>👤<br>Profile</div>

</div>

</div>

<script>

let timer=30;
let period=20260522100050266;

let wallet=1000;

let currentBet=null;

/* SIGNUP */

function signup(){

let email=document.getElementById("email").value;
let password=document.getElementById("password").value;

let id=Math.floor(Math.random()*999999);

localStorage.setItem("email",email);
localStorage.setItem("password",password);
localStorage.setItem("userId",id);

alert("Signup Successful");

}

/* LOGIN */

function login(){

let email=document.getElementById("email").value;
let password=document.getElementById("password").value;

let saveEmail=localStorage.getItem("email");
let savePassword=localStorage.getItem("password");

if(email===saveEmail && password===savePassword){

localStorage.setItem("login","yes");

document.getElementById("loginPage").style.display="none";
document.getElementById("gamePage").style.display="block";

document.getElementById("userId").innerHTML=localStorage.getItem("userId");
document.getElementById("userEmail").innerHTML=email;

}else{

alert("Wrong Email or Password");

}

}

/* LOGOUT */

function logout(){

localStorage.removeItem("login");

location.reload();

}

/* AUTO LOGIN */

window.onload=function(){

if(localStorage.getItem("login")==="yes"){

document.getElementById("loginPage").style.display="none";

document.getElementById("gamePage").style.display="block";

document.getElementById("userId").innerHTML=localStorage.getItem("userId");

document.getElementById("userEmail").innerHTML=localStorage.getItem("email");

}

}

/* DEPOSIT */

function depositMoney(){

let utr=prompt("Enter UTR Number");

let id=Math.floor(Math.random()*9999);

let date=new Date().toLocaleString();

let row=`

<tr>

<td>${id}</td>

<td>${localStorage.getItem("email")}</td>

<td>${utr}</td>

<td>${date}</td>

<td style="color:orange;">Pending</td>

</tr>

`;

document.getElementById("depositHistory").innerHTML += row;

alert("Deposit Request Submitted");

}

/* WITHDRAW */

function withdrawMoney(){

let name=prompt("Account Holder Name");

let bank=prompt("Bank Name");

let account=prompt("Account Number");

let ifsc=prompt("IFSC Code");

let amount=prompt("Withdraw Amount");

let date=new Date().toLocaleString();

let row=`

<tr>

<td>${localStorage.getItem("userId")}</td>

<td>${name}</td>

<td>${bank}</td>

<td>${account}</td>

<td>${ifsc}</td>

<td>₹${amount}</td>

<td>${date}</td>

</tr>

`;

document.getElementById("withdrawHistory").innerHTML += row;

alert("Withdrawal Submitted");

}

/* BET */

function bet(value){

currentBet=value;

alert("Bet Placed On "+value);

}

/* TIMER */

setInterval(()=>{

timer--;

document.getElementById("timer").innerHTML=timer;

document.getElementById("period").innerHTML=period;

if(timer<=0){

timer=30;

period++;

let result=Math.floor(Math.random()*10);

let type=result>=5?"BIG":"SMALL";

if(currentBet==result || currentBet==type){

wallet+=100;

alert("You Win ₹100");

}else{

wallet-=100;

alert("You Lose ₹100");

}

document.getElementById("wallet").innerHTML=wallet;

}

},1000);

</script>

</body>
</html>
