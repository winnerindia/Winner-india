<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Winner India Login</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#000;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .login-box{
      width:90%;
      max-width:350px;
      background:#111;
      padding:30px;
      border-radius:15px;
      text-align:center;
      box-shadow:0 0 10px rgba(255,255,255,0.1);
    }

    h1{
      color:#fff;
      margin-bottom:20px;
    }

    input{
      width:100%;
      padding:12px;
      margin:10px 0;
      border:none;
      border-radius:8px;
      outline:none;
      font-size:16px;
    }

    button{
      width:100%;
      padding:12px;
      margin-top:10px;
      border:none;
      border-radius:8px;
      background:red;
      color:#fff;
      font-size:16px;
      cursor:pointer;
    }

    button:hover{
      opacity:0.9;
    }

    p{
      color:#aaa;
      margin-top:15px;
      font-size:14px;
    }
  </style>
</head>
<body>

  <div class="login-box">
    <h1>Winner India</h1>

    <input type="email" id="email" placeholder="Enter Email">
    <input type="password" id="password" placeholder="Enter Password">

    <button onclick="signup()">Signup</button>
    <button onclick="login()">Login</button>

    <p>India's Fastest Gaming Platform</p>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

    import {
      getAuth,
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBb-g4otSn7qbnUagPopcgpV1KHJMPDZdo",
      authDomain: "winnerindia-b60c1.firebaseapp.com",
      projectId: "winnerindia-b60c1",
      storageBucket: "winnerindia-b60c1.firebasestorage.app",
      messagingSenderId: "998173148826",
      appId: "1:998173148826:web:2b3b6d6e90b0f121b30123"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    window.signup = function () {

      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      createUserWithEmailAndPassword(auth, email, password)
      .then(() => {

        alert("Account Created Successfully");

      })
      .catch((error) => {

        alert(error.message);

      });
    }

    window.login = function () {

      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      signInWithEmailAndPassword(auth, email, password)
      .then(() => {

        alert("Login Successful");

      })
      .catch((error) => {

        alert(error.message);

      });
    }
  </script>

</body>
</html>
