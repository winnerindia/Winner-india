<!DOCTYPE html>
<html>
<head>
<title>Winner India</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="topbar">
<div class="logo">Winner India</div>
<a href="admin.html">
<button class="admin-btn">Admin</button>
</a>
</div>

<div class="container">

<div id="loginBox" class="card">

<h2>Login / Signup</h2>

<input type="email" id="email" placeholder="Enter Email">

<input type="password" id="password" placeholder="Enter Password">

<button onclick="signup()">Signup</button>

<button onclick="login()">Login</button>

</div>

<div id="mainPanel" style="display:none;">

<div class="card">

<h2>ID: <span id="userId"></span></h2>

<h3 id="userEmail"></h3>

<h1>₹<span id="balance">1000</span></h1>

<button onclick="deposit()">Deposit</button>

<button onclick="withdraw()">Withdraw</button>

<button onclick="logout()">Logout</button>

</div>

<div class="card">

<h1>WinGo 30Sec</h1>

<h2 id="timer">30</h2>

<button onclick="bet('GREEN')">Green</button>

<button onclick="bet('RED')">Red</button>

<button onclick="bet('VIOLET')">Violet</button>

</div>

<div class="card">

<h2>Deposit History</h2>

<div id="depositHistory"></div>

</div>

<div class="card">

<h2>Withdraw History</h2>

<div id="withdrawHistory"></div>

</div>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
