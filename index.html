<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Winner India</title>

<style>

body{
margin:0;
padding:0;
background:#000;
font-family:Arial,sans-serif;
color:white;
padding-bottom:90px;
}

.header{
background:#111;
padding:20px;
text-align:center;
font-size:35px;
font-weight:bold;
color:#ffd700;
}

.balance{
margin:15px;
padding:20px;
background:#1c1c1c;
border-radius:15px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.banner{
padding:15px;
}

.banner img{
width:100%;
height:180px;
object-fit:cover;
border-radius:20px;
}

.games{
padding:15px;
}

.games h2{
font-size:40px;
margin-bottom:20px;
}

.game-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.game-card{
background:#1c1c1c;
border-radius:20px;
overflow:hidden;
text-decoration:none;
}

.game-card img{
width:100%;
height:170px;
object-fit:cover;
}

.game-card p{
text-align:center;
padding:15px;
font-size:25px;
font-weight:bold;
color:white;
}

.game-box{
margin:15px;
background:#1c1c1c;
padding:20px;
border-radius:20px;
}

.timer-box{
background:#f0c96a;
padding:20px;
border-radius:15px;
text-align:center;
color:#000;
}

.timer{
font-size:70px;
font-weight:bold;
color:#00ff99;
}

.color-buttons{
display:flex;
gap:10px;
margin-top:20px;
}

.color-buttons button{
flex:1;
padding:15px;
border:none;
border-radius:12px;
font-size:22px;
font-weight:bold;
color:white;
}

.green-btn{
background:#00b050;
}

.red-btn{
background:#ff2b2b;
}

.violet-btn{
background:#b000ff;
}

.number-grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
margin-top:20px;
}

.num{
height:60px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:28px;
font-weight:bold;
color:white;
}

.green{
background:#00b050;
}

.red{
background:#ff2b2b;
}

.violet{
background:#b000ff;
}

.big-small{
display:flex;
margin-top:20px;
}

.big-btn,
.small-btn{
flex:1;
padding:18px;
border:none;
font-size:28px;
font-weight:bold;
color:white;
}

.big-btn{
background:#d8902f;
border-radius:15px 0 0 15px;
}

.small-btn{
background:#4f8fe8;
border-radius:0 15px 15px 0;
}

.history{
margin-top:25px;
background:#111;
padding:15px;
border-radius:15px;
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
color:white;
}

th{
background:#403d56;
padding:12px;
font-size:20px;
}

td{
padding:12px;
text-align:center;
border-bottom:1px solid #333;
font-size:18px;
}

.bottom-nav{
position:fixed;
bottom:0;
width:100%;
background:#111;
display:flex;
justify-content:space-around;
padding:12px 0;
}

.bottom-nav a{
color:white;
text-decoration:none;
font-size:20px;
text-align:center;
}

</style>

</head>

<body>

<div class="header">
Winner India
</div>

<div class="balance">
Balance ₹950
</div>

<div class="banner">
<img src="https://images.unsplash.com/photo-1511512578047-dfb367046420?w=1200">
</div>

<div class="games">

<h2>Popular Games</h2>

<div class="game-grid">

<a href="#game-section" class="game-card">
<img src="https://images.unsplash.com/photo-1511512578047-dfb367046420?w=500">
<p>Lottery</p>
</a>

<a href="#" class="game-card">
<img src="https://images.unsplash.com/photo-1596838132731-3301c3fd4317?w=500">
<p>Casino</p>
</a>

<a href="#" class="game-card">
<img src="https://images.unsplash.com/photo-1541278107931-e006523892df?w=500">
<p>Slots</p>
</a>

<a href="#" class="game-card">
<img src="https://images.unsplash.com/photo-1518546305927-5a555bb7020d?w=500">
<p>Spin Wheel</p>
</a>

</div>

</div>

<div class="game-box" id="game-section">

<h1 style="color:#ffd54f;text-align:center;">
WinGo 30sec
</h1>

<div class="timer-box">

<p>Time Remaining</p>

<div class="timer" id="timer">
30
</div>

<p id="period">
20260522100050266
</p>

</div>

<div class="color-buttons">

<button class="green-btn">
Green
</button>

<button class="violet-btn">
Violet
</button>

<button class="red-btn">
Red
</button>

</div>

<div class="number-grid">

<div class="num violet">0</div>
<div class="num green">1</div>
<div class="num red">2</div>
<div class="num green">3</div>
<div class="num red">4</div>

<div class="num violet">5</div>
<div class="num red">6</div>
<div class="num green">7</div>
<div class="num red">8</div>
<div class="num green">9</div>

</div>

<div class="big-small">

<button class="big-btn">
Big
</button>

<button class="small-btn">
Small
</button>

</div>

<div class="history">

<h2>Game History</h2>

<table>

<tr>
<th>Period</th>
<th>Number</th>
<th>Result</th>
</tr>

<tr>
<td>50265</td>
<td style="color:#00ff99;">7</td>
<td>BIG</td>
</tr>

<tr>
<td>50264</td>
<td style="color:red;">2</td>
<td>SMALL</td>
</tr>

<tr>
<td>50263</td>
<td style="color:#00ff99;">9</td>
<td>BIG</td>
</tr>

</table>

</div>

</div>

<div class="bottom-nav">

<a href="#">
🏠<br>Home
</a>

<a href="#">
🎁<br>Promotion
</a>

<a href="#">
💰<br>Wallet
</a>

<a href="#">
📞<br>Support
</a>

</div>

<script>

let time = 30;

setInterval(() => {

time--;

document.getElementById("timer").innerHTML = time;

if(time <= 0){

time = 30;

}

},1000);

</script>

</body>
</html>
