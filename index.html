<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Winner India</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#0f0f0f;
color:white;
padding-bottom:80px;
}

.top{
background:#1b1b1b;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #333;
}

.logo{
font-size:24px;
font-weight:bold;
color:#ff2e2e;
}

.balance{
background:#262626;
padding:10px 15px;
border-radius:10px;
font-size:14px;
}

.banner{
margin:15px;
background:linear-gradient(45deg,#ff0000,#ff5e00);
padding:25px;
border-radius:20px;
text-align:center;
}

.banner h1{
font-size:28px;
margin-bottom:10px;
}

.banner p{
font-size:14px;
margin-bottom:15px;
}

.play-btn{
background:white;
color:black;
padding:12px 30px;
border:none;
border-radius:12px;
font-size:18px;
font-weight:bold;
}

.section-title{
padding:15px;
font-size:20px;
font-weight:bold;
}

.games{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
padding:0 15px;
}

.card{
background:#1c1c1c;
padding:20px;
border-radius:18px;
text-align:center;
border:1px solid #2f2f2f;
}

.card img{
width:60px;
margin-bottom:10px;
}

.card h3{
margin-bottom:10px;
}

.card button{
background:#ff2e2e;
border:none;
padding:10px 20px;
color:white;
border-radius:10px;
}

.vip{
margin:20px 15px;
background:#1c1c1c;
padding:20px;
border-radius:20px;
border:1px solid #333;
}

.vip h2{
color:gold;
margin-bottom:10px;
}

.bottom{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#1b1b1b;
display:flex;
justify-content:space-around;
padding:12px 0;
border-top:1px solid #333;
}

.bottom a{
color:white;
text-decoration:none;
font-size:14px;
text-align:center;
}

.recharge{
position:fixed;
right:20px;
bottom:90px;
background:#ff2e2e;
width:60px;
height:60px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:30px;
box-shadow:0 0 15px red;
}
</style>
</head>

<body>

<div class="top">
<div class="logo">Winner India</div>
<div class="balance">₹ 10,500</div>
</div>

<div class="banner">
<h1>Play & Win</h1>
<p>India's Fastest Gaming Platform</p>
<button class="play-btn">Play Now</button>
</div>

<div class="section-title">Popular Games</div>

<div class="games">

<div class="card">
<h3>Color Prediction</h3>
<button>Play</button>
</div>

<div class="card">
<h3>Lottery Game</h3>
<button>Play</button>
</div>

<div class="card">
<h3>Crash Game</h3>
<button>Play</button>
</div>

<div class="card">
<h3>Spin Win</h3>
<button>Play</button>
</div>

</div>

<div class="vip">
<h2>VIP Rewards</h2>
<p>Recharge more and unlock VIP bonuses daily.</p>
</div>

<div class="recharge">+</div>

<div class="bottom">
<a href="#">Home</a>
<a href="#">Games</a>
<a href="#">Wallet</a>
<a href="#">Profile</a>
</div>

</body>
</html>
