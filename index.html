<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Winner India Lottery</title>

<style>

body{
margin:0;
padding:0;
background:#000;
font-family:Arial;
color:white;
}

.container{
width:90%;
max-width:450px;
margin:auto;
padding:20px;
}

.game-box{
background:#111;
padding:20px;
border-radius:20px;
margin-top:20px;
text-align:center;
}

h1{
color:#ffd54f;
font-size:45px;
}

.timer{
font-size:90px;
font-weight:bold;
color:#00ff99;
margin:20px 0;
}

#period{
font-size:25px;
margin-bottom:20px;
}

.bet-box input{
width:200px;
padding:12px;
border:none;
border-radius:10px;
font-size:20px;
text-align:center;
margin-bottom:20px;
}

.color-buttons{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

.color-buttons button{
padding:15px 25px;
border:none;
border-radius:15px;
font-size:25px;
font-weight:bold;
color:white;
cursor:pointer;
}

.green-btn{
background:green;
}

.red-btn{
background:red;
}

.violet-btn{
background:purple;
}

.number-grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:15px;
margin-top:20px;
}

.num{
width:70px;
height:70px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:35px;
font-weight:bold;
cursor:pointer;
margin:auto;
}

.green{
background:#00c853;
}

.red{
background:#ff1744;
}

.violet{
background:#aa00ff;
}

.big-small{
margin-top:25px;
display:flex;
justify-content:center;
gap:15px;
}

.big-btn,
.small-btn{
padding:15px 40px;
border:none;
border-radius:15px;
font-size:30px;
font-weight:bold;
color:white;
cursor:pointer;
}

.big-btn{
background:orange;
}

.small-btn{
background:#2196f3;
}

.history{
margin-top:30px;
background:#1a1a1a;
padding:15px;
border-radius:15px;
}

.history h2{
font-size:35px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
padding:12px;
font-size:20px;
border-bottom:1px solid #333;
text-align:center;
}

</style>
</head>

<body>

<div class="container">

<div class="game-box">

<h1>WinGo 30sec</h1>

<p>Time Remaining</p>

<div class="timer" id="timer">30</div>

<p id="period">20260522100050266</p>

<div class="bet-box">

<input type="number" id="betAmount" placeholder="Enter Amount">

</div>

<div class="color-buttons">

<button class="green-btn">Green</button>
<button class="violet-btn">Violet</button>
<button class="red-btn">Red</button>

</div>

<div class="number-grid">

<div class="num violet">0</div>
<div class="num green">1</div>
<div class="num red">2</div>
<div class="num green">3</div>
<div class="num red">4</div>

<div class="num violet">5</div>
<div class="num red">6</div>
<div class="num green">7</div>
<div class="num red">8</div>
<div class="num green">9</div>

</div>

<div class="big-small">

<button class="big-btn">Big</button>
<button class="small-btn">Small</button>

</div>

<div class="history">

<h2>Game History</h2>

<table>

<tr>
<th>Period</th>
<th>Number</th>
<th>Result</th>
</tr>

<tr>
<td>50265</td>
<td style="color:#00ff99;">7</td>
<td>BIG</td>
</tr>

<tr>
<td>50264</td>
<td style="color:red;">2</td>
<td>SMALL</td>
</tr>

</table>

</div>

</div>

</div>

<script>

let time = 30;
let period = 20260522100050266;

setInterval(() => {

time--;

document.getElementById("timer").innerHTML = time;
document.getElementById("period").innerHTML = period;

if(time <= 0){

time = 30;
period++;

let num = Math.floor(Math.random()*10);

let result = "";

if(num >= 5){
result = "BIG";
}else{
result = "SMALL";
}

const table = document.querySelector(".history table");

const row = `
<tr>
<td>${period}</td>
<td style="color:${num%2==0?'red':'#00ff99'}">${num}</td>
<td>${result}</td>
</tr>
`;

table.innerHTML += row;

}

},1000);

document.querySelectorAll(".num").forEach(btn=>{

btn.onclick = function(){

let amount = document.getElementById("betAmount").value;

alert("Number " + this.innerText + " Bet ₹" + amount);

}

});

document.querySelector(".big-btn").onclick = function(){

let amount = document.getElementById("betAmount").value;

alert("BIG Bet ₹" + amount + " Successfully");

}

document.querySelector(".small-btn").onclick = function(){

let amount = document.getElementById("betAmount").value;

alert("SMALL Bet ₹" + amount + " Successfully");

}

document.querySelector(".green-btn").onclick = function(){

let amount = document.getElementById("betAmount").value;

alert("GREEN Bet ₹" + amount + " Successfully");

}

document.querySelector(".red-btn").onclick = function(){

let amount = document.getElementById("betAmount").value;

alert("RED Bet ₹" + amount + " Successfully");

}

document.querySelector(".violet-btn").onclick = function(){

let amount = document.getElementById("betAmount").value;

alert("VIOLET Bet ₹" + amount + " Successfully");

}

</script>

</body>
</html>
