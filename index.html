<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Winner India</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="topbar">
<div class="logo">Winner India</div>
<div>
<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>
</div>
</div>

<div class="wallet-box">
<h2>Wallet Balance</h2>
<h1 id="balance">₹1000</h1>
<button onclick="deposit()">Deposit</button>
<button onclick="withdrawMoney()">Withdraw</button>
</div>

<div class="game-box">
<h1>WinGo 30sec</h1>
<p>Time Remaining</p>
<div class="timer" id="timer">30</div>

<input type="number" id="betAmount" placeholder="Bet Amount">

<div class="buttons">
<button class="green" onclick="placeBet('GREEN')">Green</button>
<button class="red" onclick="placeBet('RED')">Red</button>
<button class="violet" onclick="placeBet('VIOLET')">Violet</button>
</div>

<div class="buttons">
<button class="big" onclick="placeBet('BIG')">Big</button>
<button class="small" onclick="placeBet('SMALL')">Small</button>
</div>

<div class="numbers">
<button onclick="placeBet('0')">0</button>
<button onclick="placeBet('1')">1</button>
<button onclick="placeBet('2')">2</button>
<button onclick="placeBet('3')">3</button>
<button onclick="placeBet('4')">4</button>
<button onclick="placeBet('5')">5</button>
<button onclick="placeBet('6')">6</button>
<button onclick="placeBet('7')">7</button>
<button onclick="placeBet('8')">8</button>
<button onclick="placeBet('9')">9</button>
</div>

</div>

<div class="rules">
<h2>महत्वपूर्ण नियम</h2>
<p>1. Withdrawal दिन में केवल 3 बार किया जा सकता है।</p>
<p>2. Gaming लाइन में सरकार 30% टैक्स लेती है।</p>
<p>3. सही बैंक डिटेल भरें।</p>
</div>

<div class="bottom-nav">
<button onclick="home()">Home</button>
<button onclick="promotion()">Promotion</button>
<button onclick="wallet()">Wallet</button>
<button onclick="support()">Support</button>
</div>

<script src="firebase.js"></script>
<script src="app.js"></script>
</body>
</html>
